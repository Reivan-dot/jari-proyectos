<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda — Distribuidora Automotriz JARI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --azul:#1b2456; --azul-osc:#141b42; --rojo:#d61f26; --rojo-osc:#b3171d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background:#eef0f7; color:var(--azul); font-family:'Montserrat',Arial,sans-serif; }

        /* ===== BARRA SUPERIOR (total a la izquierda, cliente a la derecha) ===== */
        .topbar {
            position: sticky; top: 0; z-index: 100; background: var(--azul-osc); color:#fff;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
            gap: 10px; padding: 12px 20px; box-shadow: 0 2px 12px rgba(0,0,0,.3);
        }
        .total-box { font-family:'Oswald',sans-serif; }
        .total-box .etq { font-size:.7rem; letter-spacing:1px; text-transform:uppercase; color:#aeb4d6; display:block; }
        .total-box .val { font-size:1.7rem; font-weight:700; color:#fff; }
        .cliente-box { display:flex; align-items:center; gap:14px; }
        .cliente-box .nombre { font-weight:600; }
        .cliente-box .nombre small { display:block; font-weight:300; color:#aeb4d6; font-size:.72rem; }
        .btn-salir { background:transparent; border:1.5px solid #aeb4d6; color:#fff; padding:7px 16px; border-radius:6px; cursor:pointer; font-size:.78rem; text-transform:uppercase; letter-spacing:1px; }
        .btn-salir:hover { background:var(--rojo); border-color:var(--rojo); }

        /* ===== ENCABEZADO TIENDA + BUSCADOR ===== */
        .cabecera { text-align:center; padding: 26px 20px 6px; }
        .cabecera img { height: 56px; }
        .cabecera h1 { font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:1px; margin-top:8px; font-size:1.4rem; }
        .cabecera h1 span { color:var(--rojo); }
        .buscador { max-width:480px; margin:16px auto 0; }
        .buscador input { width:100%; padding:13px 18px; border:2px solid #cfd4e8; border-radius:30px; font-size:1rem; font-family:inherit; outline:none; }
        .buscador input:focus { border-color:var(--rojo); }

        .estado-carga { text-align:center; padding:50px 20px; color:#667; font-size:1.05rem; }

        /* ===== GRID DE PRODUCTOS ===== */
        .catalogo {
            display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px; max-width: 1180px; margin: 20px auto 130px; padding: 0 20px;
        }
        .card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 6px 16px rgba(27,36,86,.10); display:flex; flex-direction:column; }
        .card img { width:100%; height:170px; object-fit:contain; background:#fafafa; padding:10px; }
        .card .info { padding:14px; display:flex; flex-direction:column; flex:1; }
        .card .cod { font-size:.68rem; color:#9aa; letter-spacing:1px; }
        .card h3 { font-size:.95rem; color:var(--azul); margin:2px 0 6px; }
        .card .desc { font-size:.8rem; color:#666; font-weight:300; flex:1; }
        .card .precio { font-family:'Oswald',sans-serif; font-size:1.4rem; color:var(--rojo); font-weight:700; margin-top:10px; }
        .card .medida { font-size:.72rem; color:#888; text-transform:uppercase; letter-spacing:1px; }
        .qty { display:flex; align-items:center; gap:8px; margin-top:12px; }
        .qty button { width:34px; height:34px; border:none; border-radius:8px; background:var(--azul); color:#fff; font-size:1.2rem; cursor:pointer; }
        .qty button:hover { background:var(--rojo); }
        .qty input { width:54px; height:34px; text-align:center; border:2px solid #cfd4e8; border-radius:8px; font-size:1rem; font-family:inherit; }

        /* ===== BARRA INFERIOR (enviar pedido) ===== */
        .pedido-bar {
            position: fixed; bottom:0; left:0; right:0; background:#fff; box-shadow:0 -2px 14px rgba(0,0,0,.12);
            display:flex; align-items:center; justify-content:space-between; gap:14px; padding:14px 20px; flex-wrap:wrap;
        }
        .pedido-bar .resumen { font-family:'Oswald',sans-serif; }
        .pedido-bar .resumen .grande { font-size:1.5rem; color:var(--rojo); font-weight:700; }
        .btn-pedido { background:#25D366; color:#fff; border:none; padding:14px 26px; border-radius:8px; font-family:'Oswald',sans-serif; font-size:1rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
        .btn-pedido:hover { background:#1da851; }
        .btn-pedido:disabled { background:#bbb; cursor:not-allowed; }

        @media (max-width:480px){ .total-box .val{ font-size:1.3rem; } .cabecera h1{ font-size:1.15rem; } }
    </style>
</head>
<body>

    <!-- Barra superior: TOTAL a la izquierda, cliente a la derecha -->
    <div class="topbar">
        <div class="total-box">
            <span class="etq">Total del pedido</span>
            <span class="val">$<span id="totalArriba">0.00</span></span>
        </div>
        <div class="cliente-box">
            <div class="nombre" id="nombreCliente">Cliente<small id="numeroCliente"></small></div>
            <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
        </div>
    </div>

    <div class="cabecera">
        <img src="logojari.png" alt="Distribuidora Automotriz JARI">
        <h1>Catálogo de <span>Productos</span></h1>
        <div class="buscador"><input type="text" id="buscar" placeholder="🔎 Buscar por nombre o código..." oninput="render()"></div>
    </div>

    <div class="estado-carga" id="estadoCarga">Cargando productos...</div>
    <div class="catalogo" id="catalogo"></div>

    <!-- Barra inferior: resumen + enviar pedido -->
    <div class="pedido-bar">
        <div class="resumen">
            <span id="totalArticulos">0</span> artículo(s) · Total: <span class="grande">$<span id="totalAbajo">0.00</span></span>
        </div>
        <button class="btn-pedido" id="btnPedido" onclick="enviarPedido()" disabled>📲 Enviar pedido por WhatsApp</button>
    </div>

    <script>
        /* =================== CONFIGURACIÓN =================== */
        var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwj_eRINwOroXb1aS3WZBYGNUd8z7nx86QHOUZ6g2Z98uIMl51PVyG4p6605SvePVOZ/exec';
        var WHATSAPP = '526672161558';
        var MONEDA = 'MXN';
        var RUTA_IMAGENES = ''; // si pones las fotos en una carpeta, ej: 'fotos/'

        /* Catálogo de respaldo (se usa solo si la hoja de Google aún no está lista) */
        var FALLBACK = [
            { codigo:'756', nombre:'Faros LED Rectangulares (ejemplo)', descripcion:'Configura tu hoja "Productos" en Google.', precio:0, medida:'Par', img:'756.png' }
        ];

        /* =================== SESIÓN =================== */
        var cliente = null;
        try { cliente = JSON.parse(sessionStorage.getItem('jari_cliente')); } catch (e) {}
        if (!cliente || !cliente.nombre) {
            window.location.href = 'index.html#clientes';
        } else {
            document.getElementById('nombreCliente').childNodes[0].nodeValue = '👤 ' + cliente.nombre;
            document.getElementById('numeroCliente').textContent = 'Cliente N° ' + cliente.numero;
        }

        var PRODUCTOS = [];
        var CANT = {}; // cantidades por código (se conservan al buscar)

        function fmt(n) { return n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        /* =================== CARGAR CATÁLOGO =================== */
        fetch(SCRIPT_URL + '?accion=catalogo')
            .then(function (r) { return r.json(); })
            .then(function (res) {
                PRODUCTOS = (res.ok && res.productos && res.productos.length) ? res.productos : FALLBACK;
                arrancar();
            })
            .catch(function () { PRODUCTOS = FALLBACK; arrancar(); });

        function arrancar() {
            document.getElementById('estadoCarga').style.display = 'none';
            render();
        }

        /* =================== DIBUJAR CATÁLOGO (con buscador) =================== */
        function render() {
            var q = (document.getElementById('buscar').value || '').toLowerCase().trim();
            var cont = document.getElementById('catalogo');
            cont.innerHTML = '';
            PRODUCTOS.forEach(function (p) {
                if (q && (String(p.nombre).toLowerCase().indexOf(q) < 0 &&
                          String(p.codigo).toLowerCase().indexOf(q) < 0)) return;
                var cant = CANT[p.codigo] || 0;
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML =
                    '<img src="' + RUTA_IMAGENES + p.img + '" alt="' + p.nombre + '" onerror="this.style.opacity=.25">' +
                    '<div class="info">' +
                        '<span class="cod">CÓDIGO: ' + p.codigo + '</span>' +
                        '<h3>' + p.nombre + '</h3>' +
                        '<p class="desc">' + (p.descripcion || '') + '</p>' +
                        '<div class="precio">$' + fmt(p.precio) + ' <span class="medida">/ ' + p.medida + '</span></div>' +
                        '<div class="qty">' +
                            '<button onclick="cambiar(\'' + p.codigo + '\',-1)">−</button>' +
                            '<input type="number" min="0" value="' + cant + '" ' +
                                   'onchange="setCant(\'' + p.codigo + '\',this.value)" ' +
                                   'oninput="setCant(\'' + p.codigo + '\',this.value)">' +
                            '<button onclick="cambiar(\'' + p.codigo + '\',1)">+</button>' +
                        '</div>' +
                    '</div>';
                cont.appendChild(card);
            });
        }

        function setCant(codigo, valor) {
            var v = parseInt(valor, 10); if (isNaN(v) || v < 0) v = 0;
            CANT[codigo] = v;
            recalcular();
        }
        function cambiar(codigo, delta) {
            var v = (CANT[codigo] || 0) + delta; if (v < 0) v = 0;
            CANT[codigo] = v;
            render();
            recalcular();
        }

        function recalcular() {
            var total = 0, articulos = 0;
            PRODUCTOS.forEach(function (p) {
                var v = CANT[p.codigo] || 0;
                total += v * p.precio; articulos += v;
            });
            document.getElementById('totalArriba').textContent = fmt(total);
            document.getElementById('totalAbajo').textContent = fmt(total);
            document.getElementById('totalArticulos').textContent = articulos;
            document.getElementById('btnPedido').disabled = (articulos === 0);
        }

        function enviarPedido() {
            var lineas = [], total = 0;
            PRODUCTOS.forEach(function (p) {
                var v = CANT[p.codigo] || 0;
                if (v > 0) { var sub = v * p.precio; total += sub;
                    lineas.push('• ' + v + ' x ' + p.nombre + ' (' + p.codigo + ') = $' + fmt(sub)); }
            });
            if (!lineas.length) return;
            var msg = 'Hola, soy el cliente N° ' + cliente.numero + ' (' + cliente.nombre + ').\n' +
                      'Quiero hacer este pedido:\n\n' + lineas.join('\n') +
                      '\n\nTOTAL: $' + fmt(total) + ' ' + MONEDA;
            window.open('https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');
        }

        function cerrarSesion() {
            sessionStorage.removeItem('jari_cliente');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
